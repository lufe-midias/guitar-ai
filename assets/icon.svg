<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="30%" cy="20%" r="100%">
      <stop offset="0%"  stop-color="#1a2540"/>
      <stop offset="40%" stop-color="#0f1730"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </radialGradient>

    <!-- Coral → cyan brand gradient -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ee5b3a"/>
      <stop offset="50%" stop-color="#d846b0"/>
      <stop offset="100%" stop-color="#1cb6cf"/>
    </linearGradient>

    <linearGradient id="brandStrong" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff6f4a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22cce8" stop-opacity="1"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <!-- HUD grid pattern -->
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>

    <!-- Mask: rounded square (squircle-ish) -->
    <clipPath id="appMask">
      <rect x="64" y="64" width="896" height="896" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- The whole icon goes inside the squircle mask -->
  <g clip-path="url(#appMask)">

    <!-- Background -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

    <!-- Ambient glow blobs -->
    <circle cx="180" cy="180" r="220" fill="#ee5b3a" opacity="0.45" filter="url(#softGlow)"/>
    <circle cx="900" cy="900" r="280" fill="#1cb6cf" opacity="0.40" filter="url(#softGlow)"/>
    <circle cx="900" cy="180" r="180" fill="#d846b0" opacity="0.30" filter="url(#softGlow)"/>

    <!-- HUD grid -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#grid)"/>

    <!-- Subtle scan line -->
    <rect x="0" y="380" width="1024" height="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="0" y="640" width="1024" height="2" fill="rgba(255,255,255,0.04)"/>

    <!-- ====================================================== -->
    <!-- Centerpiece: stylized guitar pick with circuit-style G -->
    <!-- ====================================================== -->

    <!-- Pick outer glow halo -->
    <path d="M 512 200
             C 700 200, 820 360, 820 500
             C 820 660, 660 824, 512 824
             C 364 824, 204 660, 204 500
             C 204 360, 324 200, 512 200 Z"
          fill="url(#brand)" opacity="0.18" filter="url(#softGlow)"/>

    <!-- Pick body -->
    <path d="M 512 220
             C 692 220, 808 372, 808 500
             C 808 654, 656 808, 512 808
             C 368 808, 216 654, 216 500
             C 216 372, 332 220, 512 220 Z"
          fill="url(#brandStrong)"
          opacity="0.95"
          filter="url(#glow)"/>

    <!-- Inner pick highlight -->
    <path d="M 512 260
             C 660 260, 760 388, 760 500
             C 760 624, 632 760, 512 760
             C 392 760, 264 624, 264 500
             C 264 388, 364 260, 512 260 Z"
          fill="rgba(0,0,0,0.45)"/>

    <!-- "G" mark in center, weighty display style -->
    <text x="512" y="600"
          text-anchor="middle"
          font-family="-apple-system, 'SF Pro Display', Helvetica, sans-serif"
          font-size="380"
          font-weight="800"
          fill="url(#brandStrong)"
          letter-spacing="-12">G</text>

    <!-- Highlight stroke around G -->
    <text x="512" y="600"
          text-anchor="middle"
          font-family="-apple-system, 'SF Pro Display', Helvetica, sans-serif"
          font-size="380"
          font-weight="800"
          fill="none"
          stroke="rgba(255,255,255,0.20)"
          stroke-width="3"
          letter-spacing="-12">G</text>

    <!-- Circuit dot accents (4 corners around G) -->
    <circle cx="320" cy="380" r="6" fill="#22cce8"/>
    <circle cx="704" cy="380" r="6" fill="#22cce8"/>
    <circle cx="320" cy="640" r="6" fill="#ff6f4a"/>
    <circle cx="704" cy="640" r="6" fill="#ff6f4a"/>

    <!-- Soundwave hint at bottom -->
    <g transform="translate(0, 0)" opacity="0.7">
      <rect x="380" y="704" width="6" height="20" rx="3" fill="#22cce8"/>
      <rect x="400" y="694" width="6" height="40" rx="3" fill="#22cce8"/>
      <rect x="420" y="684" width="6" height="60" rx="3" fill="#ff6f4a"/>
      <rect x="440" y="674" width="6" height="80" rx="3" fill="#ff6f4a"/>
      <rect x="460" y="694" width="6" height="40" rx="3" fill="#ff6f4a"/>
      <rect x="480" y="704" width="6" height="20" rx="3" fill="#ff6f4a"/>
      <rect x="538" y="704" width="6" height="20" rx="3" fill="#ff6f4a"/>
      <rect x="558" y="694" width="6" height="40" rx="3" fill="#ff6f4a"/>
      <rect x="578" y="684" width="6" height="60" rx="3" fill="#ff6f4a"/>
      <rect x="598" y="674" width="6" height="80" rx="3" fill="#22cce8"/>
      <rect x="618" y="694" width="6" height="40" rx="3" fill="#22cce8"/>
      <rect x="638" y="704" width="6" height="20" rx="3" fill="#22cce8"/>
    </g>

    <!-- subtle frame highlight on the squircle -->
    <rect x="64" y="64" width="896" height="896" rx="200" ry="200"
          fill="none"
          stroke="rgba(255,255,255,0.08)"
          stroke-width="2"/>
  </g>
</svg>
